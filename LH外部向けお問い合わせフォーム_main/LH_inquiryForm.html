      <div class="titleArea">
        <h1>お問い合わせ</h1>
        <div>ー Contact ー</div>
      </div>
      <form class="InputForm" action="">
        <div class="InputArea">
          <div class="InputField">
            <div class="InputGroup dottedBorder">
              <div class="InputSpacing ">
                <div class="labelGroup RequiredMark">お名前</div>
                <div class="InputSpacingName">
                  <input type="text" class="familyNameInput" placeholder="例）留学" />　<input type="text"
                    class="firstNameInput" placeholder="例）花子" />
                </div>
              </div>
            </div>

            <div class="InputGroup dottedBorder">
              <div class="InputSpacing">
                <div class="labelGroup RequiredMark">お名前（カナ）</div>
                <div class="InputSpacingName">
                  <input type="text" class="familyNameKanaInput" placeholder="例）RYUGAKU" />　<input type="text"
                    class="firstNameKanaInput" placeholder="例）HANAKO" />
                </div>
              </div>
            </div>

            <div class="addressArea">
              <div class="addressAddressFieldLabel">住所</div>
              <div class="addressInputArea">
                <div class="InputGroup addressGroup">
                  <span class="addressFieldLabel postCodeInput">郵便番号</span>
                  <input type="text" class="addressInput" placeholder="例）1510053" />
                  <span class="postCodeExplanation">半角数字　-（ハイフン）なしで入力してください。<br />
                    郵便番号を入力されますと住所が自動で表示されます。</span>
                </div>

                <div class="InputGroup addressGroup">
                  <span class="addressFieldLabel">住所１（都道府県）</span>
                  <input type="text" class="prefectureInput" placeholder="例）東京都" />
                </div>
                <div class="InputGroup addressGroup">
                  <span class="addressFieldLabel">住所２（市区町村）</span>
                  <input type="text" class="cityInput" placeholder="例）渋谷区" />
                </div>
                <div class="InputGroup addressGroup">
                  <span class="addressFieldLabel">住所３（番地）</span>
                  <input type="text" class="streetInput" placeholder="例）1-12-34" />
                </div>
                <div class="InputGroup addressGroup">
                  <span class="addressFieldLabel">住所４（建物名、お部屋番号）</span>
                  <input type="text" class="buildingInput" placeholder="例）〇〇ビル001" />
                </div>
              </div>
            </div>

            <div class="InputGroup dottedBorder">
              <div class="labelGroup RequiredMark">メールアドレス</div>
              <div class="InputSpacing">
                <input type="text" class="mailInput" placeholder="例）littleheroes@sample.co.jp" />
              </div>
            </div>
            <div class="InputGroup dottedBorder">
              <div class="labelGroup RequiredMark">電話番号</div>
              <div class="InputSpacing">
                <input type="text" class="phoneInput" placeholder="例）09012345678" />
              </div>
            </div>

            <div class="InputGroup dottedBorder">
              <div class="labelGroup RequiredMark">お問い合わせ種別</div>
              <div class="radioArea">
                <div class="radioLineBreak">
                  <div class="radioItem radioItem1">
                    <input type="radio" name="inquiryType" /><span class="radioSelect">無料説明会について</span>
                  </div>
                  <div class="radioItem radioItem2">
                    <input type="radio" name="inquiryType" /><span class="radioSelect">内容について</span>
                  </div>
                  <div class="radioItem radioItem3">
                    <input type="radio" name="inquiryType" /><span class="radioSelect">料金について</span>
                  </div>
                </div>
                <div class="radioLineBreak">
                  <div class="radioItem radioItem4">
                    <input type="radio" name="inquiryType" /><span class="radioSelect">サービス全般について</span>
                  </div>
                  <div class="radioItem radioItem5">
                    <input type="radio" name="inquiryType" /><span class="radioSelect">その他お問い合わせ</span>
                  </div>
                </div>
              </div>
            </div>
            <div class="InputGroup dottedBorder">
              <div class="labelGroup RequiredMark">お問い合わせ内容</div>
              <div class="InputSpacing">
                <textarea class="inquiryContentInput" rows="12" cols="65"
                  placeholder="例）littleheroes@sample.co.jp"></textarea>
              </div>
            </div>
          </div>
          <div class="sendButtonArea">
            <div class="privacyPolicyArea">
              <div>プライバシーポリシーに同意する。</div>
              <div class="privacyPolicyField">
                <input type="checkbox" class="privacyPolicyCheckbox" />同意する
              </div>
            </div>
            <div class="sendButtonField">
              <button type="submit" class="sendButton">送信する</button>
            </div>
          </div>
        </div>
      </form>
